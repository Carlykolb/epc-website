<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EPC Product Import</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 60px auto; color: #222; }
  h1 { font-size: 1.3rem; }
  label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.9rem; }
  input { display: block; margin-top: 6px; width: 100%; padding: 8px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 10px 18px; background: #1a3c34; color: white; border: none; border-radius: 4px; cursor: pointer; }
  #result { margin-top: 16px; padding: 12px; border-radius: 4px; display: none; }
  .ok { background: #e6f4ea; color: #1e4620; }
  .err { background: #fdecea; color: #611a15; }
</style>
</head>
<body>
  <h1>Import / Update Product List</h1>
  <p>Upload a CSV with columns: sku, brand, model, description, price, stock_quantity. Existing SKUs are updated; new ones are added.</p>

  <form id="importForm">
    <label>Admin key
      <input type="password" id="adminKey" required />
    </label>
    <label>CSV file
      <input type="file" id="csvFile" accept=".csv" required />
    </label>
    <button type="submit">Import</button>
  </form>

  <div id="result"></div>

  <script>
    document.getElementById('importForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resultBox = document.getElementById('result');
      resultBox.style.display = 'none';

      const formData = new FormData();
      formData.append('file', document.getElementById('csvFile').files[0]);

      try {
        const res = await fetch('/api/admin/import-products', {
          method: 'POST',
          headers: { 'x-admin-key': document.getElementById('adminKey').value },
          body: formData,
        });
        const data = await res.json();

        resultBox.style.display = 'block';
        if (res.ok) {
          resultBox.className = 'ok';
          resultBox.textContent = `Done! Imported/updated ${data.imported} products.` +
            (data.skipped_count ? ` (${data.skipped_count} rows were skipped - missing sku/brand/model.)` : '');
        } else {
          resultBox.className = 'err';
          resultBox.textContent = data.error || 'Something went wrong.';
        }
      } catch (err) {
        resultBox.style.display = 'block';
        resultBox.className = 'err';
        resultBox.textContent = 'Network error - please try again.';
      }
    });
  </script>
</body>
</html>
